# docker-compose.yml
# Runs both FastAPI and Streamlit together


services:

  # FastAPI Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: churn_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    restart: always

  # Streamlit Service
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: churn_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: always